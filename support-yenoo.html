<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Spendly</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1e1e24; color: #fff; line-height: 1.6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #2b2b36; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; text-align: center; }
        h1 { color: #4ade80; margin-bottom: 10px; }
        p { margin-bottom: 30px; font-size: 1.1em; color: #ccc; }
        .donate-btn { display: inline-block; background-color: #0070ba; color: #fff; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2em; transition: background-color 0.3s, transform 0.2s; }
        .donate-btn:hover { background-color: #005ea6; transform: translateY(-2px); }
        .footer { margin-top: 30px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Spendly</h1>
        <p>If you find <strong>Spendly</strong> helpful in managing your budget, consider making a donation. Your support helps cover server costs and keeps the app ad-free.</p>
        
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=ra_kh@yahoo.fr&item_name=Support+Spendly&currency_code=USD" class="donate-btn" target="_blank">Donate with PayPal</a>
        
        <p class="footer">Thank you from the Yenoo team! 🐾</p>
    </div>
</body>
</html>
