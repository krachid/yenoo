<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendly - Private & Ad-Free Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
--bg-color: #0f172a;
--surface-color: #1e293b;
--primary-color: #10b981; /* Emerald Green */
--text-main: #f8fafc;
--text-muted: #94a3b8;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Inter', sans-serif;
}

body {
background-color: var(--bg-color);
color: var(--text-main);
line-height: 1.6;
}

.container {
max-width: 900px;
margin: 0 auto;
padding: 0 20px;
}

header {
text-align: center;
padding: 80px 20px 40px;
}

h1 {
font-size: 3rem;
font-weight: 800;
margin-bottom: 15px;
background: linear-gradient(to right, #34d399, #10b981);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.subtitle {
font-size: 1.2rem;
color: var(--text-muted);
max-width: 600px;
margin: 0 auto 30px;
}

.play-badge img {
height: 60px;
border-radius: 8px;
transition: transform 0.2s;
}

.play-badge img:hover {
transform: scale(1.05);
}

.card {
background-color: var(--surface-color);
border-radius: 16px;
padding: 40px;
margin-bottom: 40px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.features-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
margin-top: 20px;
}

.feature-item {
background: rgba(255,255,255,0.03);
padding: 20px;
border-radius: 12px;
border-left: 4px solid var(--primary-color);
}

.feature-item h3 {
margin-bottom: 10px;
font-size: 1.1rem;
}

.feature-item p {
font-size: 0.95rem;
color: var(--text-muted);
}

.donation-section {
text-align: center;
}

.donation-methods {
display: flex;
flex-direction: column;
gap: 15px;
margin-top: 30px;
max-width: 500px;
margin-left: auto;
margin-right: auto;
}

.donate-box {
background: rgba(255,255,255,0.05);
padding: 15px 20px;
border-radius: 10px;
display: flex;
justify-content: space-between;
align-items: center;
border: 1px solid rgba(255,255,255,0.1);
}

.donate-box strong {
color: var(--primary-color);
}

.copy-btn, .paypal-btn {
background-color: var(--primary-color);
color: #000;
border: none;
padding: 8px 16px;
border-radius: 6px;
font-weight: 600;
cursor: pointer;
text-decoration: none;
font-size: 0.9rem;
transition: background 0.2s;
}

.copy-btn:hover, .paypal-btn:hover {
background-color: #34d399;
}

.crypto-address {
font-family: monospace;
color: var(--text-muted);
font-size: 0.85rem;
margin-right: 15px;
word-break: break-all;
}

footer {
text-align: center;
padding: 40px 20px;
color: var(--text-muted);
font-size: 0.9rem;
}

@media (max-width: 600px) {
.donate-box {
flex-direction: column;
gap: 10px;
text-align: center;
}
.crypto-address {
margin-right: 0;
}
}
</style>
</head>
<body>

<header class="container">
<h1>Spendly</h1>
<p class="subtitle">A beautiful, private, and ad-free personal finance tracker. Built natively for Android using Kotlin & Jetpack Compose.</p>
<a href="https://play.google.com/store/apps/details?id=com.spendlywal
